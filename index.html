<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Técnico y Presupuestador - Fábrica de Aberturas</title>
  <style>
    :root {
      /* Nueva Paleta Saturada y Rica */
      --bg: #FFFFFF; /* Fondo blanco puro para máxima legibilidad */
      --card-bg: #FFFFFF; 
      --text: #333333; /* Texto oscuro y nítido para alta legibilidad */
      --primary: #813563; /* El Púrpura Profundo */
      --accent: #1E908A; /* El Teal Saturado */
      --medida-capsule: #AF3795; /* El Naranja Quemado */
      
      /* MAPEO DE COLORES DE LA PALETA */
      --ho-plum: #813563; 
      --ho-coral: #FA425A; 
      --ho-orange: #AF3795; 
      --ho-yellow: #F6BC59; 
      --ho-teal: #1E908A; 
      
      --danger: #FA425A; /* Coral para el botón de eliminar */
      --blur-effect: blur(10px); /* Efecto de desenfoque para Soft UI */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 20px; position: relative; min-height: 100vh; overflow-x: hidden; }

    header { max-width: 1200px; margin: 0 auto 30px auto; text-align: center; position: relative; z-index: 10; padding: 15px; background: var(--primary); border-radius: 12px; box-shadow: 0 4px 15px rgba(129, 53, 99, 0.2); }
    header h1 { color: #FFFFFF; margin-bottom: 5px; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    header p { color: #fdfaf7; font-size: 0.9rem; }

    /* --- UNIFIED DISCOVERY PANEL (REDISEÑO DE FILTROS) --- */
    .search-container { max-width: 1200px; margin: 0 auto 25px auto; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(129, 53, 99, 0.04); border: 1px solid rgba(129, 53, 99, 0.08); position: relative; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
    .search-box { width: 100%; padding: 18px; border: 1px solid rgba(129, 53, 99, 0.15); border-radius: 14px; font-size: 1.15rem; transition: all 0.3s; background: rgba(255, 255, 255, 0.8); color: var(--text); box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); }
    .search-box:focus { border-color: var(--accent); outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01), 0 0 12px rgba(30, 144, 138, 0.2); }

    .filter-section-title { font-size: 0.75rem; font-weight: 800; color: #95a5a6; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: -8px; }
    .category-filters { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-btn { padding: 10px 22px; background: #f2f4f4; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; color: #7f8c8d; transition: all 0.3s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; border: 1px solid transparent; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(30, 144, 138, 0.25); border-color: rgba(255,255,255,0.2); }

    .advanced-filters { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 10px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; min-width: 220px; flex: 1; }
    .filter-group label { font-size: 0.75rem; font-weight: 800; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
    .filter-select { padding: 14px; border: 1px solid rgba(129, 53, 99, 0.12); border-radius: 12px; background: #ffffff; font-size: 0.95rem; cursor: pointer; color: var(--text); outline: none; transition: all 0.2s; font-weight: 600; }
    .filter-select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(129, 53, 99, 0.15); }

    /* CONTENEDOR DE FILTROS ACTIVOS (CHIPS) */
    .active-chips-container { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 5px; }
    .filter-chip { display: flex; align-items: center; gap: 6px; background: rgba(129, 53, 99, 0.08); color: var(--primary); padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; border: 1px solid rgba(129, 53, 99, 0.12); animation: fadeIn 0.2s ease-out; }
    .chip-remove { background: transparent; border: none; color: var(--ho-coral); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; margin-left: 4px; font-weight: bold; }
    .chip-remove:hover { color: var(--danger); transform: scale(1.1); }

    /* FILA DE CONTROLES REUBICADOS */
    .controls-row { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; z-index: 10; position: relative; padding: 0 5px; }
    .results-counter { font-weight: 700; color: #7f8c8d; font-size: 0.9rem; display: flex; align-items: center; }
    .reset-link { color: var(--ho-orange); cursor: pointer; text-decoration: underline; font-size: 0.85rem; font-weight: bold; margin-left: 12px; transition: color 0.2s; }
    .reset-link:hover { color: var(--primary); }
    
    .view-switcher { display: flex; background: #eaeded; padding: 5px; border-radius: 50px; gap: 5px; }
    .view-btn { padding: 7px 18px; border: none; background: transparent; font-weight: 700; color: #7f8c8d; border-radius: 50px; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; text-transform: uppercase; }
    .view-btn.active { background: white; color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

    /* --- CONTENEDOR PRINCIPAL DINÁMICO --- */
    .grid-productos { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; z-index: 10; position: relative; }
    
    /* --- VISTA TARJETAS --- */
    .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(129, 53, 99, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: all 0.3s ease-in-out; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 45px rgba(129, 53, 99, 0.1); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
    .card .cat { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
    .badge-medida-top { background: var(--primary); padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 0.8rem; color: #FFFFFF; white-space: nowrap; }
    .card .title { font-size: 1.35rem; color: var(--text); font-weight: 800; margin-bottom: 15px; letter-spacing: -0.5px; }
    .card .info-line { margin-bottom: 7px; font-size: 0.9rem; color: #444; }
    .card .info-line span { font-weight: 700; color: #555; }
    
    .price-container { margin-top: auto; padding-top: 15px; border-top: 1px dashed rgba(0,0,0,0.06); display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    .price-label { font-size: 0.9rem; font-weight: bold; color: var(--text); }
    .price-input-wrapper { display: flex; align-items: center; position: relative; flex: 1; }
    .price-symbol { position: absolute; left: 10px; font-weight: bold; color: var(--ho-coral); font-size: 1.1rem; }
    .price-input { width: 100%; padding: 10px 10px 10px 28px; border: 1px solid rgba(0,0,0,0.06); border-radius: 10px; font-weight: 800; color: var(--ho-coral); font-size: 1.1rem; outline: none; transition: all 0.2s; background: rgba(255, 255, 255, 0.6); }
    .price-input:focus { border-color: var(--ho-coral); background-color: #fffdfc; }
    .price-input::-webkit-outer-spin-button, .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .price-input { -moz-appearance: textfield; }

    .btn-add-cart { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .btn-add-cart:hover { box-shadow: 0 4px 15px rgba(30, 144, 138, 0.3); }

    /* --- VISTA TABLA --- */
    .tabla-contenedor { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(129, 53, 99, 0.05); }
    .tabla-productos { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    .tabla-productos th { background: #eaeded; color: #7f8c8d; padding: 15px; font-weight: bold; border-bottom: 2px solid rgba(0,0,0,0.04); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .tabla-productos td { padding: 12px 15px; border-bottom: 1px solid rgba(0,0,0,0.03); color: #444; vertical-align: middle; }
    .tabla-productos tr:last-child td { border-bottom: none; }
    .tabla-productos tr:hover td { background-color: #faffff; }
    
    .tabla-price-wrapper { display: flex; align-items: center; position: relative; width: 130px; }
    .tabla-price-input { width: 100%; padding: 7px 7px 7px 22px; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; font-weight: 800; color: var(--ho-coral); outline: none; background: rgba(255,255,255,0.6); }
    .tabla-btn-add { padding: 7px 14px; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }

    /* --- INTERFAZ CARRITO / PRESUPUESTO --- */
    .cart-float-btn { position: fixed; bottom: 25px; right: 25px; background: var(--accent); color: white; border: none; padding: 16px 24px; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(30, 144, 138, 0.3); display: flex; align-items: center; gap: 10px; z-index: 999; transition: transform 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .cart-float-btn:hover { transform: scale(1.05); }
    .cart-badge { background: white; color: var(--accent); padding: 3px 9px; border-radius: 12px; font-size: 0.85rem; font-weight: 900; }

    .cart-sidebar { position: fixed; top: 10px; right: -420px; width: 400px; height: calc(100vh - 20px); background: var(--card-bg); box-shadow: -10px 0 30px rgba(0,0,0,0.05); z-index: 1000; transition: right 0.3s ease-out; display: flex; flex-direction: column; border-radius: 20px 0 0 20px; border: 1px solid rgba(129, 53, 99, 0.05); border-right: none; }
    .cart-sidebar.open { right: 10px; }
    .cart-header { padding: 25px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 18px 0 0 0; }
    .cart-header h2 { font-weight: 800; letter-spacing: -1px; font-size: 1.5rem; }
    .cart-close { background: transparent; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
    
    .cart-items-list { padding: 25px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px dashed rgba(0,0,0,0.06); font-size: 0.9rem; }
    .cart-item-details { flex: 1; padding-right: 10px; }
    .cart-item-title { font-weight: bold; color: var(--text); }
    .cart-item-meta { font-size: 0.8rem; color: #7f8c8d; margin-top: 2px; }
    
    .cart-item-controls { display: flex; align-items: center; gap: 8px; }
    .qty-input { width: 50px; padding: 6px; text-align: center; border: 1px solid rgba(129, 53, 99, 0.1); border-radius: 6px; font-weight: bold; background: rgba(255,255,255,0.6); color: var(--text); }
    .btn-remove-item { background: transparent; border: none; color: var(--danger); font-weight: bold; cursor: pointer; padding: 4px; font-size: 1.5rem; line-height: 1; }
    
    .cart-footer { padding: 25px; background: var(--bg); border-top: 1px solid rgba(0,0,0,0.04); border-radius: 0 0 0 18px; }
    .bonif-container { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.6); padding: 12px 16px; border-radius: 10px; border: 1px dashed var(--ho-orange); margin-bottom: 15px; }
    .bonif-label { font-weight: bold; font-size: 0.85rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
    .bonif-input-wrapper { display: flex; align-items: center; gap: 5px; }
    .bonif-input { width: 70px; padding: 7px; border: 1px solid rgba(129, 53, 99, 0.1); border-radius: 6px; font-weight: bold; text-align: center; color: var(--text); font-size: 1.1rem; background: rgba(255,255,255,0.6); }

    .cart-total-row { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 800; color: var(--ho-coral); margin-bottom: 18px; letter-spacing: -0.5px; }
    
    .btn-generate-budget { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-generate-budget:hover { box-shadow: 0 4px 15px rgba(30, 144, 138, 0.3); }

    /* --- MODAL IMPRESIÓN PRESUPUESTO OFICIAL --- */
    .modal-budget { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
    .modal-budget.open { display: flex; }
    .modal-budget-content { background: white; width: 100%; max-width: 850px; max-height: 90vh; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 15px 45px rgba(0,0,0,0.15); overflow: hidden; }
    .modal-budget-actions { padding: 18px 25px; background: #eaeded; border-bottom: 1px solid rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; }
    .modal-budget-actions > span { font-weight: bold; color: #7f8c8d; font-size: 0.9rem; }
    .btn-print { padding: 10px 24px; background: var(--accent); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-print:hover { box-shadow: 0 4px 10px rgba(30, 144, 138, 0.3); }
    .btn-close-budget { padding: 10px 20px; background: #95a5a6; color: white; border: none; border-radius: 50px; cursor: pointer; margin-left: 10px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;}
    
    .print-area { padding: 45px; flex: 1; overflow-y: auto; background: white; color: #333; }
    .print-header { display: flex; justify-content: space-between; border-bottom: 3px solid #333; padding-bottom: 25px; margin-bottom: 25px; }
    .print-company-info h2 { color: #333; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
    .print-company-info p { font-size: 0.85rem; color: #555; margin-top: 4px; }
    .print-budget-title { text-align: right; }
    .print-budget-title h3 { text-transform: uppercase; color: #7f8c8d; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; }
    .print-budget-title p { font-size: 0.9rem; margin-top: 6px; font-weight: bold; color: #333; }
    
    .print-table { width: 100%; border-collapse: collapse; margin-top: 25px; margin-bottom: 25px; font-size: 0.85rem; }
    .print-table th { border-bottom: 2px solid #555; padding: 12px; text-align: left; background: #eaeded; color: #333; }
    .print-table td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); vertical-align: middle; }
    
    .print-summary-box { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 20px; border-top: 3px solid #333; margin-top: 15px; }
    .print-summary-line { font-size: 1rem; color: #555; }
    .print-total { font-size: 1.5rem; font-weight: 900; color: var(--ho-coral); margin-top: 8px; letter-spacing: -0.5px; }
    .print-conditions { margin-top: 45px; font-size: 0.8rem; color: #7f8c8d; border-top: 1px dashed rgba(0,0,0,0.08); padding-top: 18px; line-height: 1.4; }

    .no-results { grid-column: 1 / -1; text-align: center; padding: 40px 0; color: #888; font-size: 1.2rem; background: rgba(255,255,255,0.6); border-radius: 12px; border: 1px dashed rgba(0,0,0,0.06); margin: 20px 0; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* AJUSTES PARA IMPRESIÓN */
    @media print {
      body { padding: 0; background: white; }
      body * { visibility: hidden; }
      #modal-budget, #modal-budget.open { position: absolute; left: 0; top: 0; width: 100%; background: white; display: block; overflow: visible; backdrop-filter: none; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0; overflow: visible; box-shadow: none; border-radius: 0; }
      .print-table th { background: #f0f0f0 !important; color: black !important; border-bottom: 2px solid black; }
      .modal-budget-content { box-shadow: none; border-radius: 0; position: absolute; width: 100%; height: 100%; }
      .modal-budget-actions, .bonif-container { display: none !important; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Catálogo de Aberturas</h1>
    <p>Fábrica de Aberturas :: Catálogo y Presupuestador</p>
  </header>

  <div class="search-container">
    <input type="text" id="buscador" class="search-box" placeholder="Escribí para buscar... Ej: Ventana 1200x1160, Puerta, Portón">
    
    <div class="filter-section-title">Categorías Rápidas</div>
    <div class="category-filters" id="contenedor-filtros">
      <button class="filter-btn active" data-cat="Todos">Todos los Productos</button>
    </div>

    <div class="filter-section-title">Filtros Avanzados</div>
    <div class="advanced-filters">
      <div class="filter-group">
        <label for="select-linea">Filtrar por Línea</label>
        <select id="select-linea" class="filter-select">
          <option value="Todos">Todas las líneas</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="select-medida">Filtrar por Medida</label>
        <select id="select-medida" class="filter-select">
          <option value="Todos">Todas las medidas</option>
        </select>
      </div>
    </div>

    <div id="active-chips-container" class="active-chips-container"></div>
  </div>

  <div class="controls-row">
    <div class="results-counter">
      <span id="contador">Productos listados: 0</span>
      <span id="btn-limpiar" class="reset-link" style="display:none;">(Limpiar filtros)</span>
    </div>
    
    <div class="view-switcher">
      <button id="btn-view-grid" class="view-btn active">Grilla</button>
      <button id="btn-view-table" class="view-btn">Tabla</button>
    </div>
  </div>

  <main id="contenedor-principal" class="grid-productos"></main>

  <button id="floating-cart-btn" class="cart-float-btn">
    Presupuesto <span id="cart-count" class="cart-badge">0</span>
  </button>

  <div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2>Items Seleccionados</h2>
      <button id="cart-close-btn" class="cart-close">&times;</button>
    </div>
    <div id="cart-items-list" class="cart-items-list"></div>
    <div class="cart-footer">
      <div class="bonif-container">
        <span class="bonif-label">Bonificación (%):</span>
        <div class="bonif-input-wrapper">
          <input type="number" id="cart-bonif-input" class="bonif-input" value="0" min="0" max="100">
        </div>
      </div>

      <div class="cart-total-row">
        <span>Total Neto:</span>
        <span id="cart-total-value">$0</span>
      </div>
      <button id="btn-open-budget" class="btn-generate-budget">📄 Generar Documento</button>
    </div>
  </div>

  <div id="modal-budget" class="modal-budget">
    <div class="modal-budget-content">
      <div class="modal-budget-actions">
        <span>Presupuesto de Obra</span>
        <div>
          <button
